spring:
  datasource:
    url: jdbc:h2:mem:focusroot_test;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: false

app:
  jwt:
    secret: test-jwt-secret-key-for-ci-only-32chars
    expiration-ms: 3600000

logging:
  level:
    com.focusroot: WARN
