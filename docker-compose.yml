version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: focusroot-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: focusroot123
      MYSQL_DATABASE: focusroot_db
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pfocusroot123"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: focusroot-phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: focusroot123
    ports:
      - "8081:80"

volumes:
  mysql_data:
    driver: local
